<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Groww MF P&L Tracker Cloud</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
color:#fff;
padding:20px;
}
.container{
max-width:1200px;
margin:auto;
}
.header{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:24px;
border-radius:24px;
margin-bottom:20px;
box-shadow:0 8px 30px rgba(0,0,0,.3);
}
h1{
margin:0;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
margin:20px 0;
}
.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:20px;
border-radius:20px;
box-shadow:0 8px 30px rgba(0,0,0,.25);
}
.metric{
font-size:30px;
font-weight:700;
margin-top:8px;
}
.pos{
color:#4ade80;
}
.neg{
color:#f87171;
}
input,button{
padding:12px;
border:none;
border-radius:12px;
margin:4px;
}
button{
background:#22c55e;
color:white;
font-weight:700;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
}
th,td{
padding:12px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.1);
}
th{
background:rgba(255,255,255,.08);
}
.months{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
}
.month{
padding:12px;
border-radius:14px;
background:rgba(255,255,255,.05);
}
.small{
font-size:12px;
opacity:.7;
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>📈 Mutual Fund P&L Dashboard</h1>
<div class="small">Cloud Synced via Google Sheets</div>
</div>
<div class="card">
<input type="date" id="date">
<input type="number" id="pnl" placeholder="Daily P/L">
<button onclick="addEntry()">➕ Add Entry</button>
</div>
<div class="grid">
<div class="card">
<div>Current Month</div>
<div id="monthTotal" class="metric">₹0</div>
</div>
<div class="card">
<div>Current Year</div>
<div id="yearTotal" class="metric">₹0</div>
</div>
<div class="card">
<div>Best Day</div>
<div id="bestDay" class="metric pos">₹0</div>
</div>
<div class="card">
<div>Worst Day</div>
<div id="worstDay" class="metric neg">₹0</div>
</div>
</div>
<div class="card">
<h2>📅 Monthly Performance</h2>
<div class="months" id="months"></div>
</div>
<div class="card">
<h2>📋 Daily Entries</h2>
<table>
<thead>
<tr>
<th>Date</th>
<th>P/L</th>
</tr>
</thead>
<tbody id="entries"></tbody>
</table>
</div>
</div>
<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbyRi7tRhl6QY299MsEyDaMGO4D1wBXRsIdLqBOPFgKZnXux1CUReLZBu76-rRsLDApu/exec";
let data=[];
async function loadData(){
try{
const res=await fetch(API_URL);
const rows=await res.json();
data=rows.slice(1).map(r=>({
date:r[0],
pnl:Number(r[1])
}));
render();
}catch(err){
console.error(err);
}
}
async function addEntry(){
let d=document.getElementById('date').value;
let p=parseFloat(document.getElementById('pnl').value);
if(!d || isNaN(p)) return;
await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
date:d,
pnl:p
})
});
document.getElementById('pnl').value='';
loadData();
}
function render(){
let tbody=document.getElementById('entries');
let monthsDiv=document.getElementById('months');
tbody.innerHTML='';
monthsDiv.innerHTML='';
let currentYear=new Date().getFullYear();
let currentMonth=new Date().getMonth();
let yearTotal=0;
let monthTotal=0;
let best=-Infinity;
let worst=Infinity;
let monthly=new Array(12).fill(0);
const monthNames=[
'January',
'February',
'March',
'April',
'May',
'June',
'July',
'August',
'September',
'October',
'November',
'December'
];
data.forEach(r=>{

const dt = new Date(r.date);

if(dt.getFullYear() === year){

    yearTotal += Number(r.pnl);

    monthly[dt.getMonth()] += Number(r.pnl);

    if(dt.getMonth() === month){
        monthTotal += Number(r.pnl);
    }
}

best = Math.max(best, Number(r.pnl));
worst = Math.min(worst, Number(r.pnl));

const displayDate =
dt.toLocaleDateString('en-IN',{
    day:'2-digit',
    month:'long',
    year:'numeric',
    timeZone:'Asia/Kolkata'
});

tbody.innerHTML += `
<tr>
<td>${displayDate}</td>
<td class="${r.pnl>=0?'pos':'neg'}">
₹${Number(r.pnl).toLocaleString('en-IN')}
</td>
</tr>`;
});
monthNames.forEach((name,index)=>{
let value=monthly[index];
monthsDiv.innerHTML+=`
<div class="month">
<div>${name}</div>
<div class="${value>=0?'pos':'neg'}">
<b>₹${value.toLocaleString('en-IN')}</b>
</div>
</div>`;
});
document.getElementById('yearTotal').innerHTML=
'₹'+yearTotal.toLocaleString('en-IN');
document.getElementById('monthTotal').innerHTML=
'₹'+monthTotal.toLocaleString('en-IN');
document.getElementById('bestDay').innerHTML=
'₹'+(best===-Infinity?0:best).toLocaleString('en-IN');
document.getElementById('worstDay').innerHTML=
'₹'+(worst===Infinity?0:worst).toLocaleString('en-IN');
}
loadData();
</script>
</body>
</html>
